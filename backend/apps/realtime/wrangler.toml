name = "magna-coders-realtime"
main = "src/index.ts"
compatibility_date = "2024-03-03"

[vars]
# Realtime config
JWT_SECRET = "your-production-secret-key-change-this"
INTERNAL_KEY = "change-me-in-production"

[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[durable_objects.bindings]]
name = "ESCROW"
class_name = "ContractEscrow"

[[durable_objects.bindings]]
name = "NOTIFICATION_HUB"
class_name = "NotificationHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatRoom", "ContractEscrow"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["NotificationHub"]

[[d1_databases]]
binding = "DB"
database_name = "magna_db"
database_id = "dbc21996-9e43-4918-8ac6-6676593a33ff"
