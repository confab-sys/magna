name: magna_coders
description: Magna Coders Flutter client
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.2.2
  dio: ^5.4.1
  flutter_secure_storage: ^9.0.0
  flutter_dotenv: ^5.1.0
  web_socket_channel: ^2.4.0
  cupertino_icons: ^1.0.6
  flutter_riverpod: ^2.5.1
  json_annotation: ^4.9.0
  phosphor_flutter: ^2.1.0
  timeago: ^3.7.1
  image_picker: ^1.2.1
  intl: ^0.20.2
  file_picker: ^10.3.10
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/.env
